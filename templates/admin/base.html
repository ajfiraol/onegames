<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}OneGames Admin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #343a40; }
        .sidebar a { color: #adb5bd; text-decoration: none; }
        .sidebar a:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar py-3">
                <h4 class="text-white mb-4 px-3">OneGames</h4>
                <ul class="nav flex-column">
                    <li class="nav-item"><a href="/admin/" class="nav-link">Dashboard</a></li>
                    <li class="nav-item"><a href="/admin/core/userprofile/" class="nav-link">Users</a></li>
                    <li class="nav-item"><a href="/admin/core/game/" class="nav-link">Games</a></li>
                    <li class="nav-item"><a href="/admin/subscriptions/subscriptionplan/" class="nav-link">Plans</a></li>
                    <li class="nav-item"><a href="/admin/subscriptions/subscription/" class="nav-link">Subscriptions</a></li>
                    <li class="nav-item"><a href="/admin/payments/payment/" class="nav-link">Payments</a></li>
                </ul>
            </nav>
            <main class="col-md-10 ms-sm-auto px-md-4 py-3">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
